name: debug-download

on:
  workflow_dispatch:
  push:
    paths:
      - 'debug.py'

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests -q
      - run: python3 debug.py 2>&1 | tee debug_output.txt
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add debug_output.txt
          git diff --staged --quiet || git commit -m "debug output"
          git push
