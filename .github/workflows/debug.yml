name: debug-download

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: debug download
        run: |
          python3 -c "
import requests, zipfile, io

season = '114S4'
url = f'https://plvr.land.moi.gov.tw/DownloadSeason?season={season}&type=zip&fileName=H_lvr_land_A.zip'
print('URL:', url)
r = requests.get(url, timeout=60, headers={'User-Agent': 'Mozilla/5.0'})
print('HTTP:', r.status_code, 'Size:', len(r.content))
if r.status_code == 200:
    try:
        z = zipfile.ZipFile(io.BytesIO(r.content))
        print('ZIP files:', z.namelist())
        for n in z.namelist():
            if n.upper().endswith('_A.CSV'):
                import csv
                with z.open(n) as f:
                    rows = list(csv.reader(f.read().decode('utf-8-sig', errors='replace').splitlines()))
                print('rows[0]:', rows[0][:3] if rows else 'empty')
                print('rows[1]:', rows[1][:3] if len(rows)>1 else 'n/a')
                print('rows[2]:', rows[2][:3] if len(rows)>2 else 'n/a')
                longtan = [r for r in rows if len(r)>0 and '龍潭' in r[0]]
                print('龍潭 rows:', len(longtan))
    except Exception as e:
        print('Error:', e)
        print('First 200:', r.content[:200])
else:
    print('Fail:', r.text[:500])
" 2>&1 | tee debug_output.txt
      - name: commit output
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add debug_output.txt
          git commit -m "debug output" || echo "no change"
          git push || echo "push failed"
