name: 同步桃園市龍潭區實價登錄資料

on:
  schedule:
    - cron: '0 2 1,11,21 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-lvr-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下載並處理實價登錄資料
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import requests, zipfile, io, csv, os, json
          from datetime import datetime

          now = datetime.now()
          year = now.year - 1911
          month = now.month

          # 近 5 年 = 20 季
          seasons = []
          y, q = year, (month - 1) // 3 + 1
          for _ in range(20):
              seasons.append(f"{y}S{q}")
              q -= 1
              if q == 0:
                  q = 4
                  y -= 1

          all_rows = []
          headers_row = None

          for season in seasons:
              url = f"https://plvr.land.moi.gov.tw/DownloadSeason?season={season}&type=zip&fileName=H_lvr_land_A.zip"
              print(f"下載 {season}...")
              try:
                  r = requests.get(url, timeout=60, headers={"User-Agent": "Mozilla/5.0"})
                  if r.status_code != 200:
                      print(f"  跳過 {season}：HTTP {r.status_code}")
                      continue

                  z = zipfile.ZipFile(io.BytesIO(r.content))
                  print(f"  ZIP 內容: {z.namelist()}")

                  target = None
                  for name in z.namelist():
                      if name.upper().endswith('_A.CSV'):
                          target = name
                          break

                  if not target:
                      print(f"  找不到 _A.CSV，跳過")
                      continue

                  with z.open(target) as f:
                      content = f.read().decode('utf-8-sig', errors='replace')
                      reader = csv.reader(content.splitlines())
                      rows = list(reader)

                      if len(rows) < 2:
                          continue

                      # 第一行：欄位說明（中文）；第二行：英文欄位名；第三行起：資料
                      if headers_row is None:
                          headers_row = rows[1]  # 用英文欄位名
                      data_rows = rows[2:]

                      for row in data_rows:
                          if len(row) > 0 and '龍潭' in row[0]:
                              all_rows.append(row)

                  print(f"  完成，目前共 {len(all_rows)} 筆龍潭資料")

              except Exception as e:
                  print(f"  錯誤 {season}: {e}")
                  import traceback
                  traceback.print_exc()

          os.makedirs('lvr-data', exist_ok=True)

          with open('lvr-data/longtan_deals.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              if headers_row:
                  writer.writerow(headers_row)
              writer.writerows(all_rows)

          meta = {
              "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M UTC"),
              "total_rows": len(all_rows),
              "seasons_fetched": seasons
          }
          with open('lvr-data/meta.json', 'w', encoding='utf-8') as f:
              json.dump(meta, f, ensure_ascii=False, indent=2)

          print(f"\n完成！共 {len(all_rows)} 筆龍潭區成交資料")
          PYEOF

      - name: Commit 並 Push 資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lvr-data/
          git diff --staged --quiet || git commit -m "🏠 自動更新龍潭區實價登錄資料 $(date '+%Y-%m-%d')"
          git push
